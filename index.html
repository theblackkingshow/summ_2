<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dictionary SPA</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <script src="script.js" defer></script>

    <div class="container">
        <div class="header">
            <h1>Dictionary App</h1>
            <button id="theme-toggle" aria-label="Toggle theme">🌙</button>
        </div>
        <form id="search-form">
            <input type="text" id="word-input" placeholder="Enter a word" required aria-label="Word search input">
            <button type="submit">Search</button>
            <button type="button" id="random-btn">Generate Random Word</button>
        </form>
        <div id="results" class="results">

        </div>
    </div>

</body>

</html>
